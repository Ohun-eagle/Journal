<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Монитор Заказов</title>

    <!-- Иконки для главного экрана -->
    <!-- Для iPhone/iPad -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/todo-list.png">
    <!-- Для Android/Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/fluency/192/todo-list.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://img.icons8.com/fluency/32/todo-list.png">
    
    <!-- Настройки мобильного приложения -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Заказы">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: #ffffff; 
            color: #000000;
            -webkit-tap-highlight-color: transparent;
        }
        .progress-bar { transition: width 1s ease-in-out; }
        .order-card { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <!-- Шапка -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="https://img.icons8.com/fluency/48/todo-list.png" class="w-6 h-6" alt="logo">
                <h1 class="text-xl font-black tracking-tighter uppercase italic">МОНИТОР</h1>
            </div>
            <div id="connection-status" class="flex items-center gap-2">
                <span id="status-text" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Поиск базы...</span>
                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-6">
        
        <!-- Процент готовности -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-100">
            <div class="flex justify-between items-end mb-2">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Готовность цеха</span>
                <span id="percent-text" class="text-5xl font-black text-black leading-none">0%</span>
            </div>
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div id="progress-fill" class="progress-bar bg-emerald-500 h-full w-0"></div>
            </div>
        </div>

        <!-- Поиск -->
        <div class="relative mb-6">
            <input type="text" id="search-input" placeholder="Поиск по имени клиента..." 
                   class="w-full p-4 bg-white rounded-xl border-2 border-slate-100 focus:border-black outline-none font-bold transition-all shadow-sm">
        </div>

        <!-- Список заказов -->
        <div id="order-list" class="space-y-3">
            <div id="loader" class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-200 border-t-emerald-500 mb-4"></div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Синхронизация...</p>
            </div>
        </div>

    </main>

    <!-- Кнопки связи -->
    <div class="fixed bottom-6 left-0 w-full px-4 z-50">
        <div class="max-w-md mx-auto flex gap-2">
            <a id="wa-link" href="#" target="_blank" class="flex-1 bg-emerald-600 text-white text-center py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-transform">WhatsApp</a>
            <a id="call-link" href="tel:+996700123456" class="flex-1 bg-slate-900 text-white text-center py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-transform">Позвонить</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBQNdaM4gqE8gNBQm2A1XIxRlqfSjavzTw",
            authDomain: "mybusinessjournal.firebaseapp.com",
            projectId: "mybusinessjournal",
            storageBucket: "mybusinessjournal.firebasestorage.app",
            messagingSenderId: "1063822499786",
            appId: "1:1063822499786:web:36e372f6a1f2bbec0c7933"
        };

        const MY_PHONE = "996700123456"; 
        const POSSIBLE_IDS = [
            "c_927ba2c9e0e50c18_index.html-974", 
            "business-journal-shared-996"
        ];

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allOrders = [];
        let activePathFound = false;

        document.getElementById('wa-link').href = `https://wa.me/${MY_PHONE}`;

        const start = async () => {
            try {
                await signInAnonymously(auth);
                POSSIBLE_IDS.forEach(id => listenToPath(id));
            } catch (e) {
                document.getElementById('status-text').innerText = "Ошибка входа";
            }
        };

        function listenToPath(appId) {
            const path = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
            onSnapshot(path, (snap) => {
                if (!snap.empty) {
                    activePathFound = true;
                    document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]";
                    document.getElementById('status-text').innerText = "В СЕТИ";
                    allOrders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allOrders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    updateUI();
                }
            }, (err) => {
                console.log("Access denied for path", appId);
            });
        }

        function updateUI() {
            const loader = document.getElementById('loader');
            if (loader) loader.remove();

            const total = allOrders.length;
            const completed = allOrders.filter(o => o.status === 'Готово' || o.status === 'Выполнено').length;
            const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('percent-text').innerText = pct + '%';
            document.getElementById('progress-fill').style.width = pct + '%';
            renderOrders();
        }

        function renderOrders() {
            const list = document.getElementById('order-list');
            const search = document.getElementById('search-input').value.toLowerCase().trim();
            list.innerHTML = '';

            const filtered = allOrders.filter(o => (o.name || "").toLowerCase().includes(search));

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-center py-10 text-slate-400 font-bold uppercase text-[10px] tracking-widest italic">Заказов не найдено</p>';
                return;
            }

            filtered.forEach(o => {
                const isDone = o.status === 'Готово' || o.status === 'Выполнено';
                const div = document.createElement('div');
                div.className = 'order-card bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <div class="font-black text-slate-900 italic tracking-tight uppercase text-sm">${o.name || 'КЛИЕНТ'}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1 italic">${o.date || ''}</div>
                    </div>
                    <div class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest border ${isDone ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-slate-50 text-slate-400 border-slate-100'}">
                        ${o.status || 'В работе'}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('search-input').addEventListener('input', renderOrders);
        start();
    </script>
</body>
</html>
