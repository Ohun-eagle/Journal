<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус заказов | Бизнес 🇰🇬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .progress-bar { transition: width 1s ease-in-out; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="text-slate-900 pb-32">

    <!-- Шапка сайта -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🇰🇬</span>
                <span class="font-black text-xl tracking-tighter uppercase italic text-emerald-700">Бизнес Монитор</span>
            </div>
            <div id="connection-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 px-3 py-1 rounded-full">
                Подключение...
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        
        <!-- Блок статистики -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="md:col-span-2 glass-card p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Общий прогресс цеха</h2>
                <div class="flex items-end gap-4 mb-2">
                    <span id="percent-text" class="text-6xl font-black text-emerald-600">0%</span>
                    <span class="text-slate-400 font-bold pb-2 uppercase text-xs">выполнено</span>
                </div>
                <div class="w-full bg-slate-200 h-4 rounded-full overflow-hidden">
                    <div id="progress-fill" class="progress-bar bg-emerald-500 h-full w-0"></div>
                </div>
            </div>
            
            <div class="bg-emerald-700 p-8 rounded-[2.5rem] text-white shadow-xl shadow-emerald-200 flex flex-col justify-center">
                <p class="text-emerald-200 text-xs font-bold uppercase mb-1">В производстве</p>
                <p id="active-count" class="text-5xl font-black italic">0</p>
                <p class="text-emerald-100/60 text-[10px] mt-4 leading-tight italic">Обновляется в реальном времени</p>
            </div>
        </div>

        <!-- Поиск -->
        <div class="mb-8 relative">
            <input type="text" id="search-input" placeholder="Поиск по имени или номеру телефона..." 
                   class="w-full bg-white border-2 border-slate-200 p-6 rounded-3xl text-lg font-bold focus:border-emerald-500 focus:ring-0 transition-all shadow-sm outline-none pl-14">
            <span class="absolute left-6 top-7 text-slate-400 italic">🔍</span>
        </div>

        <!-- Список заказов -->
        <div id="search-results-container" class="space-y-4">
            <!-- Сюда будут выводиться результаты -->
        </div>

        <div id="empty-msg" class="text-center py-10 text-slate-400 font-bold uppercase text-xs tracking-widest hidden">
            Ничего не найдено
        </div>

    </main>

    <!-- Нижние контакты -->
    <footer class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-4 z-50">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="text-center md:text-left">
                <p class="text-[10px] font-black text-slate-400 uppercase italic">Наш адрес:</p>
                <p id="display-address" class="text-xs font-bold text-slate-800 uppercase italic underline decoration-emerald-400">г. Бишкек (укажите адрес в коде)</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <a id="link-call" href="#" class="flex-1 text-center bg-blue-600 text-white py-3 px-6 rounded-2xl font-black text-[10px] uppercase tracking-widest">📞 Позвонить</a>
                <a id="link-wa" href="#" target="_blank" class="flex-1 text-center bg-emerald-600 text-white py-3 px-6 rounded-2xl font-black text-[10px] uppercase tracking-widest">💬 WhatsApp</a>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- ВАШИ НАСТРОЙКИ ---
        const firebaseConfig = { 
            apiKey: "AIzaSyBQNdaM4gqE8gNBQm2A1XIxRlqfSjavzTw",
            authDomain: "mybusinessjournal.firebaseapp.com",
            projectId: "mybusinessjournal",
            storageBucket: "mybusinessjournal.firebasestorage.app",
            messagingSenderId: "1063822499786",
            appId: "1:1063822499786:web:36e372f6a1f2bbec0c7933"
        };

        const MY_PHONE = "996700123456"; // Номер для связи
        const MY_ADDRESS = "г. Бишкек, ул. Ваша 123";
        // -----------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ВАЖНО: Убедитесь, что этот ID совпадает с тем, где вы создаете заказы
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let allOrders = [];

        // Инициализация контактов
        document.getElementById('link-call').href = `tel:+${MY_PHONE}`;
        document.getElementById('link-wa').href = `https://wa.me/${MY_PHONE}`;
        document.getElementById('display-address').innerText = MY_ADDRESS;

        signInAnonymously(auth).catch(err => console.error("Ошибка входа:", err));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('connection-status').innerText = "Online";
                document.getElementById('connection-status').className = "text-[10px] font-bold text-emerald-600 uppercase tracking-widest bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100";
                
                // Путь к коллекции (согласно правилам системы)
                const ref = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                
                onSnapshot(ref, (snap) => {
                    allOrders = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    allOrders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    updateStats();
                    render();
                }, (err) => {
                    console.error("Ошибка Firestore:", err);
                    document.getElementById('connection-status').innerText = "Ошибка доступа";
                });
            }
        });

        function updateStats() {
            const total = allOrders.length;
            const done = allOrders.filter(o => o.status === 'Готово').length;
            const percent = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('percent-text').innerText = percent + '%';
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('active-count').innerText = total - done;
        }

        function render() {
            const container = document.getElementById('search-results-container');
            const search = document.getElementById('search-input').value.toLowerCase().trim();
            const emptyMsg = document.getElementById('empty-msg');
            
            container.innerHTML = '';

            const filtered = allOrders.filter(o => 
                o.name.toLowerCase().includes(search) || 
                o.phone.toLowerCase().includes(search) ||
                o.work.toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                emptyMsg.classList.remove('hidden');
                return;
            } else {
                emptyMsg.classList.add('hidden');
            }

            filtered.forEach(o => {
                const isDone = o.status === 'Готово';
                const waText = encodeURIComponent(`Здравствуйте! Я ${o.name}, ищу свой заказ (${o.work}). Подскажите статус?`);
                
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[2rem] shadow-sm mb-4 border-l-8 ${isDone ? 'border-emerald-500 opacity-60' : 'border-orange-400'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic mb-1">Заказ клиента</p>
                            <h3 class="text-xl font-black text-slate-800">${o.name}</h3>
                        </div>
                        <span class="px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest ${isDone ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-600 status-pulse'}">
                            ${o.status}
                        </span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase italic">Работа:</p>
                            <p class="text-xs font-bold text-slate-700">${o.work}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase italic">Дата готовности:</p>
                            <p class="text-xs font-black text-slate-800 italic underline decoration-emerald-400">${o.date ? o.date.split('-').reverse().join('.') : '---'}</p>
                        </div>
                    </div>

                    <div class="flex gap-2 border-t border-slate-100 pt-4">
                        <a href="https://wa.me/${MY_PHONE}?text=${waText}" target="_blank" class="flex-1 bg-emerald-50 text-emerald-700 py-3 rounded-2xl text-[10px] font-black uppercase tracking-tighter text-center border border-emerald-100">
                            Задать вопрос (WA)
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search-input').addEventListener('input', render);
    </script>
</body>
</html>
